name: Perf Smoke (Branch Test)

on:
  push:
    branches:
      - "3082-containerize-performance-tests-execution-gatling"
  workflow_dispatch:

jobs:
  smoke:
    uses: ./.github/workflows/tc-gatling-tests.yml
    with:
      tier: smoke
      list_file: performance-tests/simulations/perf-smoke.txt
      shard_index: 0
      shard_total: 1

      perf_base_url: "https://tctalent-test.org"
      list_id: ""

      run_budget_check: false
      max_failed_pct: 100
      max_p95_ms: 999999