# .github/workflows/perf-smoke.yml
name: Perf Smoke

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  smoke:
    uses: ./.github/workflows/tc-gatling-tests.yml
    secrets:
      USERS_CSV: ${{ secrets.STAGING_PERF_USERS_CSV }}
    with:
      tier: smoke
      list_file: performance-tests/simulations/perf-smoke.txt
      shard_index: 0
      shard_total: 1

      perf_base_url: "https://tctalent-test.org"

      run_budget_check: false
      max_failed_pct: 100
      max_p95_ms: 999999
