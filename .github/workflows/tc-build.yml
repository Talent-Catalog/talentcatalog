# This workflow will build a Java project with Gradle when changes are pushed to any branch
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: tc-build

on:
  push:
    branches:
      - '**'
      - '!staging'
      - '!master'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOOGLE_DRIVE_PRIVATEKEY: ${{ secrets.GOOGLE_DRIVE_PRIVATEKEY }}
      GOOGLE_DRIVE_PRIVATEKEYID: ${{ secrets.GOOGLE_DRIVE_PRIVATEKEYID }}
      SF_PRIVATE_KEY: ${{ secrets.SF_PRIVATE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_TEST }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_TEST }}
          aws-region: us-east-1

      - name: Download DB dump from S3
        run: |
          mkdir -p server/src/test/resources
          aws s3 cp s3://tctalent-integration-db-dumps/dump.sql server/src/test/resources/dump.sql

      - name: Build
        run: ./gradlew server:build -x test

      - name: Run all server tests for real
        run: |
          cat > ci-real-test-logging.gradle <<'EOF'
          allprojects {
            tasks.withType(Test).configureEach {
              testLogging {
                events "started", "passed", "skipped", "failed"
                exceptionFormat "full"
                showExceptions true
                showCauses true
                showStackTraces true
              }

              afterSuite { desc, result ->
                if (!desc.parent) {
                  println "RESULT for ${path}: ${result.testCount} tests, ${result.successfulTestCount} passed, ${result.failedTestCount} failed, ${result.skippedTestCount} skipped"
                }
              }
            }
          }
          EOF

          ./gradlew clean :server:test \
            --init-script ci-real-test-logging.gradle \
            --stacktrace \
            --rerun-tasks \
            --console=plain \
            --info

      - name: Run tests
        run: ./gradlew clean :server:test \
          --init-script ci-real-test-logging.gradle \
          --stacktrace \
          --rerun-tasks \
          --console=plain \
          --info

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: server/build/reports/tests/test
