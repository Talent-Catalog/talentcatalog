# This workflow will build a Java project with Gradle when changes are pushed to any branch
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: tc-build

on:
  push:
    branches:
      - '**'
      - '!staging'
      - '!master'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOOGLE_DRIVE_PRIVATEKEY: ${{ secrets.GOOGLE_DRIVE_PRIVATEKEY }}
      GOOGLE_DRIVE_PRIVATEKEYID: ${{ secrets.GOOGLE_DRIVE_PRIVATEKEYID }}
      SF_PRIVATE_KEY: ${{ secrets.SF_PRIVATE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_TEST }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_TEST }}
          aws-region: us-east-1

      - name: Download DB dump from S3
        run: |
          mkdir -p server/src/test/resources
          aws s3 cp s3://tctalent-integration-db-dumps/dump.sql server/src/test/resources/dump.sql

      - name: Build
        run: ./gradlew server:build -x test

      - name: Print exact resolved JUnit versions
        run: |
          ./gradlew :server:dependencyInsight --dependency junit-jupiter-engine --configuration testRuntimeClasspath
          ./gradlew :server:dependencyInsight --dependency junit-platform-engine --configuration testRuntimeClasspath
          ./gradlew :server:dependencyInsight --dependency junit-platform-launcher --configuration testRuntimeClasspath

      - name: Print test task config
        run: |
          cat > debug-test-config.gradle <<'EOF'
          allprojects {
            tasks.withType(Test).configureEach {
              doFirst {
                println "TEST TASK: ${path}"
                println "includes: ${includes}"
                println "excludes: ${excludes}"
                println "filter includes: ${filter.includePatterns}"
                println "filter excludes: ${filter.excludePatterns}"
                println "testClassesDirs:"
                testClassesDirs.files.each { println " - ${it}" }
              }
            }
          }
          EOF

          ./gradlew :server:test --init-script debug-test-config.gradle --test-dry-run --info --console=plain    

      - name: Print effective Gradle test config files
        run: |
          echo "Current commit:"
          git rev-parse HEAD

          echo "server/build.gradle test config:"
          grep -n "tasks.withType(Test)" -A15 server/build.gradle || true
          grep -n "tasks.named('test'" -A25 server/build.gradle || true
          grep -n "test {" -A10 server/build.gradle || true
          grep -n "includeTestsMatching" -A10 server/build.gradle || true
          grep -n "scanForTestClasses" -A10 server/build.gradle || true

          echo "Any junit-platform.properties:"
          find . -name "junit-platform.properties" -print -exec cat {} \;
          
      - name: Check CandidateServiceImplCharacterizationTest discovery
        run: |
          ./gradlew :server:test \
            --tests "org.tctalent.server.service.db.impl.CandidateServiceImplCharacterizationTest" \
            --test-dry-run \
            --info \
            --console=plain

          find server/build/test-results/test -name '*CandidateServiceImplCharacterizationTest*' -print
      - name: Run tests
        run: ./gradlew clean :server:test --stacktrace --rerun-tasks

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: server/build/reports/tests/test
