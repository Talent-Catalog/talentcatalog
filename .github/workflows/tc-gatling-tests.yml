# .github/workflows/tc-gatling-tests.yml
name: TC Gatling Tests (Reusable)

on:
  workflow_call:
    inputs:
      tier:
        required: true
        type: string

      list_file:
        required: true
        type: string

      shard_index:
        required: false
        default: 0
        type: number

      shard_total:
        required: false
        default: 1
        type: number

      perf_base_url:
        required: true
        type: string

      run_budget_check:
        required: false
        default: true
        type: boolean

      max_failed_pct:
        required: false
        default: 1.0
        type: number

      max_p95_ms:
        required: false
        default: 15000
        type: number

    secrets:
      STAGING_PERF_USERS_CSV:
        required: false

jobs:
  gatling:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Gradle cache dir exists
        run: mkdir -p .gradle-cache

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: .gradle-cache
          key: gradle-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Write users.csv from secret (optional)
        shell: bash
        env:
          STAGING_PERF_USERS_CSV: ${{ secrets.STAGING_PERF_USERS_CSV }}
        run: |
          if [[ -z "${STAGING_PERF_USERS_CSV:-}" ]]; then
            echo "STAGING_PERF_USERS_CSV is empty/not provided; skipping users.csv"
            exit 0
          fi
          f="performance-tests/src/gatling/resources/users.csv"
          mkdir -p "$(dirname "$f")"
          printf "%s" "$STAGING_PERF_USERS_CSV" > "$f"
          echo "users.csv written to $f" 

      - name: Build perf Docker runner
        run: |
          docker build \
            -f performance-tests/Dockerfile \
            -t tc-perf:${{ github.sha }} .

      - name: Prepare output dirs
        run: mkdir -p perf-reports perf-summary perf-raw

      - name: Run simulations
        env:
          SHARD_INDEX: ${{ inputs.shard_index }}
          SHARD_TOTAL: ${{ inputs.shard_total }}
        run: |
          docker run --rm \
            -e SHARD_INDEX="${SHARD_INDEX}" \
            -e SHARD_TOTAL="${SHARD_TOTAL}" \
            -e GRADLE_USER_HOME=/tmp/.gradle \
            -v "$PWD:/work" \
            -v "$PWD/.gradle-cache:/tmp/.gradle" \
            -v "$PWD/perf-reports:/work/build/reports/gatling" \
            -v "$PWD/perf-summary:/work/performance-tests/build/perf-artifacts/summary" \
            -v "$PWD/perf-raw:/work/performance-tests/build/perf-artifacts/raw" \
            tc-perf:${{ github.sha }} \
            -lc "cd /work && \
              bash ./performance-tests/ci/run-sim-list.sh '${{ inputs.list_file }}' \
              -Dperf.baseUrl='${{ inputs.perf_base_url }}'"

      - name: Debug artifact dirs (temporary)
        if: always()
        run: |
          echo "=== perf-reports ==="
          find perf-reports -maxdepth 6 -type d -print || true
          echo "=== perf-summary ==="
          ls -la perf-summary || true
          echo "=== perf-raw ==="
          ls -la perf-raw || true

      - name: Budget check
        if: ${{ inputs.run_budget_check }}
        run: |
          python3 performance-tests/ci/budget_check.py \
            --summary-json-dir perf-summary \
            --max-failed-pct ${{ inputs.max_failed_pct }} \
            --max-p95-ms ${{ inputs.max_p95_ms }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-reports-${{ inputs.tier }}-shard-${{ inputs.shard_index }}
          path: perf-reports
          if-no-files-found: ignore

      - name: Upload summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-summary-${{ inputs.tier }}-shard-${{ inputs.shard_index }}
          path: perf-summary
          if-no-files-found: ignore

      - name: Upload raw logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-raw-${{ inputs.tier }}-shard-${{ inputs.shard_index }}
          path: perf-raw
          if-no-files-found: ignore
