# .github/workflows/tc-gatling-tests.yml
name: TC Gatling Tests (Reusable)

on:
  workflow_call:
    inputs:
      tier:
        required: true
        type: string

      list_file:
        required: true
        type: string

      shard_index:
        required: false
        default: 0
        type: number

      shard_total:
        required: false
        default: 1
        type: number

      perf_base_url:
        required: true
        type: string

      list_id:
        required: false
        default: ""
        type: string

      run_budget_check:
        required: false
        default: true
        type: boolean

      max_failed_pct:
        required: false
        default: 1.0
        type: number

      max_p95_ms:
        required: false
        default: 15000
        type: number

jobs:
  gatling:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Gradle cache dir exists
        run: mkdir -p .gradle-cache

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: .gradle-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/build.gradle*', '**/settings.gradle*', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build perf Docker runner
        run: |
          docker build \
            -f performance-tests/Dockerfile \
            -t tc-perf:${{ github.sha }} .

      - name: Prepare output dirs
        run: mkdir -p perf-reports perf-summary perf-raw

      - name: Run simulations
        env:
          SHARD_INDEX: ${{ inputs.shard_index }}
          SHARD_TOTAL: ${{ inputs.shard_total }}
        run: |
          docker run --rm \
            -e SHARD_INDEX="${SHARD_INDEX}" \
            -e SHARD_TOTAL="${SHARD_TOTAL}" \
            -v "$PWD:/work" \
            -v "$PWD/.gradle-cache:/root/.gradle" \
            -v "$PWD/perf-reports:/work/performance-tests/build/reports/gatling" \
            -v "$PWD/perf-summary:/work/performance-tests/build/perf-artifacts/summary" \
            -v "$PWD/perf-raw:/work/performance-tests/build/perf-artifacts/raw" \
            tc-perf:${{ github.sha }} \
            -lc "cd /work && \
              bash ./performance-tests/ci/run-sim-list.sh '${{ inputs.list_file }}' \
              -Dperf.baseUrl='${{ inputs.perf_base_url }}' \
              ${{ inputs.list_id != '' && format('-DlistId=''{0}''', inputs.list_id) || '' }}"

      - name: Debug artifact dirs (temporary)
        if: always()
        run: |
          echo "=== perf-reports ==="
          find perf-reports -maxdepth 4 -type d -print || true
          echo "=== perf-summary ==="
          ls -la perf-summary || true
          echo "=== perf-raw ==="
          ls -la perf-raw || true

      - name: Budget check
        if: ${{ inputs.run_budget_check }}
        run: |
          python3 performance-tests/ci/budget_check.py \
            --summary-json-dir perf-summary \
            --max-failed-pct ${{ inputs.max_failed_pct }} \
            --max-p95-ms ${{ inputs.max_p95_ms }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-reports-${{ inputs.tier }}-shard-${{ inputs.shard_index }}
          path: perf-reports

      - name: Upload summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-summary-${{ inputs.tier }}-shard-${{ inputs.shard_index }}
          path: perf-summary

      - name: Upload raw logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-raw-${{ inputs.tier }}-shard-${{ inputs.shard_index }}
          path: perf-raw