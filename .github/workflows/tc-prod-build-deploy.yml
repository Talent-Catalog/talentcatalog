# This workflow builds a Java project with Gradle and deploys to TBB and OPC prod environments
# Build once, deploy to both environments in parallel for efficiency
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle
# And https://github.com/marketplace/actions/beanstalk-deploy

name: tc-prod-build-deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure AWS credentials for test resources
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download DB dump from S3
        run: |
          mkdir -p server/src/test/resources
          aws s3 cp s3://tctalent-prod-db-dumps/dump.sql server/src/test/resources/dump.sql

      - name: Build with Gradle
        run: ./gradlew server:build # We won't run the perf tests here
        env:
          GOOGLE_DRIVE_PRIVATEKEY: ${{ secrets.GOOGLE_DRIVE_PRIVATEKEY }}
          GOOGLE_DRIVE_PRIVATEKEYID: ${{ secrets.GOOGLE_DRIVE_PRIVATEKEYID }}
          SF_PRIVATE_KEY: ${{ secrets.SF_PRIVATE_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: server/build/libs/*.jar
          retention-days: 1

  deploy-tbb:
    name: Deploy to TBB Prod (us-east-1)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install credential helper - for jib
        run: sudo apt update && sudo apt install amazon-ecr-credential-helper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure AWS credentials for TBB
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to TBB with Jib
        run: ./gradlew jib -Pprod-tc-system

  deploy-opc:
    name: Deploy to OPC Prod (eu-west-2)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install credential helper - for jib
        run: sudo apt update && sudo apt install amazon-ecr-credential-helper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure AWS credentials for OPC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_OPC_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_OPC_PROD }}
          aws-region: eu-west-2

      - name: Deploy to OPC with Jib
        run: ./gradlew jib -Pprod-tc-system
