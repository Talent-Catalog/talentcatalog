name: Perf Nightly

on:
  # TEMP: run automatically when you push to your test branch
  push:
    branches:
      - 3082-containerize-performance-tests-execution-gatling

  # FUTURE: after merge into staging, it will run daily at 12:10 PM Afghanistan
  schedule:
    - cron: "45 7 * * *"   # 07:40 UTC = 12:15 Asia/Kabul

  workflow_dispatch:

jobs:
  nightly-shards:
    # Run on pushes to your test branch, OR scheduled runs on staging, OR manual dispatch anywhere
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/3082-containerize-performance-tests-execution-gatling') ||
      (github.event_name == 'schedule' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3, 4]
        shard_total: [5]
    uses: ./.github/workflows/tc-gatling-tests.yml
    secrets:
      USERS_CSV: ${{ secrets.STAGING_PERF_USERS_CSV }}
    with:
      tier: nightly
      list_file: performance-tests/simulations/perf-nightly.txt
      shard_index: ${{ matrix.shard_index }}
      shard_total: ${{ matrix.shard_total }}
      perf_base_url: "https://tctalent-test.org"
      run_budget_check: false

  nightly-budget:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/3082-containerize-performance-tests-execution-gatling') ||
      (github.event_name == 'schedule' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: nightly-shards
    steps:
      - uses: actions/checkout@v4

      - name: Download all summaries
        uses: actions/download-artifact@v4
        with:
          pattern: perf-summary-nightly-shard-*
          path: all-summaries
          merge-multiple: true

      - name: Run combined budget check
        run: |
          python3 performance-tests/ci/budget_check.py \
            --summary-json-dir all-summaries \
            --warn-only \
            --ignore-failures \
            --ignore-latency

      - name: Upload combined summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-summary-nightly-all
          path: all-summaries
