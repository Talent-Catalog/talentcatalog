<h4 class="mb-3">Import Reference Vouchers</h4>

<div class="text-muted mb-2 align-middle">
  Available Reference Vouchers: {{ availableVouchersCount }}
</div>

<div class="w-50">
  <tc-alert [type]="'info'">
    Upload a CSV with the headers: <code>voucher_code</code>, <code>expires_at</code>.
  </tc-alert>
</div>

<tc-alert *ngIf="error" type="warning">{{ error }}</tc-alert>

<div class="my-3">
  <label for="referenceFileInput" class="form-label">Upload CSV File</label>
  <input
    type="file"
    id="referenceFileInput"
    class="form-control w-75"
    (change)="onFileChange($event)"
    accept=".csv"
  />
</div>

<div class="my-3">
  <tc-button [loading]="working"
             (onClick)="importCSV()"
             [disabled]="!csvData.length || working"
  >
    Import
  </tc-button>
</div>

<div *ngIf="csvData.length">
  <tc-table [results]="csvData" [loading]="working">
    <thead>
    <tr>
      <th *ngFor="let header of csvHeaders">{{ header }}</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let row of paginatedData">
      <td *ngFor="let cell of row">{{ cell }}</td>
    </tr>
    </tbody>
  </tc-table>
</div>

<tc-pagination [totalElements]="csvData?.length || 0"
               [pageSize]="30"
               (pageChange)="onPageChange($event)"
               [pageNumber]="currentPage"
               *ngIf="csvData.length"
></tc-pagination>
