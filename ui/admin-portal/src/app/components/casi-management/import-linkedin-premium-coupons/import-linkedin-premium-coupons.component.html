<h4 class="mb-3">Import LinkedIn Premium Coupons</h4>

<div class="text-muted mb-2 align-middle">
  Available Coupons: {{ availableCouponsCount }}
</div>

<div class="w-50">
  <tc-alert [type]="'info'">
    Coupons are provided as spreadsheets via email from our LinkedIn contact.
    You may need to convert the file to CSV, which is the required format for TC import.
  </tc-alert>
</div>

<tc-alert *ngIf="error" type="warning">{{ error }}</tc-alert>

<div class="my-3">
  <label for="fileInput" class="form-label">Upload CSV File</label>
  <input
    type="file"
    id="fileInput"
    class="form-control w-75"
    (change)="onFileChange($event)"
    accept=".csv"
  />
</div>

<div class="my-3">
  <tc-button [loading]="working"
             (onClick)="importCSV()"
             [disabled]="!csvData.length || working"
  >
    Import
  </tc-button>
</div>

<app-csv-preview
  [csvHeaders]="csvHeaders"
  [csvData]="csvData"
  [paginatedData]="paginatedData"
  [working]="working"
  [currentPage]="currentPage"
  [pageSize]="pageSize"
  (pageChange)="onPageChange($event)"
></app-csv-preview>
