<input
  [(ngModel)]="linkedInLink"
  [placeholder]="'Enter your LinkedIn profile URL'"
/>

<button (click)="verify()" [disabled]="!linkedInLink || verified || redeemed">
  {{ verified ? 'Verified' : 'Verify' }}
</button>

<button (click)="redeem()" [disabled]="!verified || redeemed">
  {{ redeemed ? 'Offer Redeemed' : 'Redeem Offer' }}
</button>
