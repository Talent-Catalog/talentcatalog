<ng-container *ngIf="!assignment">
  <!-- TODO translate keys * linked in url validation -->
  <p>
    Redeeming this offer requires a LinkedIn account.
  </p>

  <p *ngIf="candidate.linkedInLink; else signUp">
    First verify the LinkedIn profile URL you provided at registration:
  </p>
  <ng-template #signUp>
    <p>
      First enter your LinkedIn profile URL.
      Sign up <a href="https://www.linkedin.com/signup">here</a>, if you haven't already.
    </p>
  </ng-template>

  <div class="row">
    <tc-input [(ngModel)]="linkedInLinkInput"
              [placeholder]="'Enter your LinkedIn profile URL'"
              class="col-12 col-lg-6"
    ></tc-input>
  </div>

  <div class="my-3">
    <tc-button (onClick)="verify()"
               [disabled]=""
               [color]="'secondary'"
    >
      Submit
    </tc-button>
  </div>
</ng-container>

<div class="mt-5 mb-3">
  <tc-button [disabled]="!canRedeem"
             (onClick)="redeem()"
             [size]="'xl'"
  >
    <i class="fa-brands fa-linkedin text-white"></i>
    Activate Your Premium Upgrade
  </tc-button>
</div>

<div>
  <tc-button [type]="'outline'" (onClick)="onBackButtonClicked()">
    <i class="me-1 fas fa-arrow-left"></i>Back
  </tc-button>
</div>
