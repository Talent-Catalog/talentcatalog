<!-- Floating Chatbot Icon -->
<div class="chatbot-icon"
     [class.open]="isOpen"
     (click)="toggleChatbot()"
     [attr.aria-label]="isOpen ? 'Close chatbot' : 'Open chatbot'"
     role="button"
     tabindex="0"
     (keydown.enter)="toggleChatbot()"
     (keydown.space)="toggleChatbot()">
  <i [class]="isOpen ? 'fas fa-times' : 'fas fa-message'"></i>
</div>

<!-- Chatbot Panel -->
<div class="chatbot-panel"
     [class.open]="isOpen"
     role="dialog"
     aria-labelledby="chatbot-title"
     (touchstart)="onTouchStart($event)"
     (touchmove)="onTouchMove($event)"
     (touchend)="onTouchEnd($event)">

  <!-- Drag Handle (Mobile Only) -->
  <div class="chatbot-drag-handle"></div>

  <!-- Panel Header -->
  <div class="chatbot-header">
    <h3 id="chatbot-title" class="chatbot-title">
      <i class="fas fa-message chatbot-title-icon"></i>
      Talent Catalog Assistant
    </h3>
    <tc-button class="chatbot-close-btn"
            (onClick)="closeChatbot()"
            aria-label="Close chatbot"
            type="plain">
      <tc-icon color="white"><i class="fas fa-times"></i></tc-icon>
    </tc-button>
  </div>

  <!-- Messages Container -->
  <div class="chatbot-messages"
       #messageContainer
       role="log"
       aria-live="polite"
       aria-label="Chat messages">
    <div *ngFor="let message of messages"
         class="message"
         [class.user-message]="message.sender === 'USER'"
         [class.bot-message]="message.sender === 'BOT'">
      <div class="message-content">
        <div class="message-text" [innerHTML]="formatMessageText(message.message)"></div>
        <div class="message-time">{{ formatTime(message.timestamp) }}</div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="chatbot-input">
    <div class="input-group">
      <textarea #messageInput
                [(ngModel)]="messageText"
                (keydown)="onKeyPress($event)"
                [placeholder]="isUnavailable ? 'Chatbot is unavailable' : 'Type your message...'"
                class="form-control chatbot-textarea"
                rows="1"
                maxlength="2000"
                aria-label="Type your message"
                [disabled]="isUnavailable">
      </textarea>
      <button class="btn btn-primary chatbot-send-btn"
              (click)="sendMessage()"
              [disabled]="!messageText.trim() || isUnavailable"
              aria-label="Send message"
              type="button">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>
</div>

<!-- Mobile Backdrop -->
<div class="chatbot-backdrop"
     *ngIf="isOpen"
     (click)="closeChatbot()"
     [class.show]="isOpen">
</div>
