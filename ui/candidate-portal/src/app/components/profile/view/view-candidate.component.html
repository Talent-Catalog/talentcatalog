<div class="container">

  <app-error [error]="error"></app-error>

  <app-loading [loading]="loading"></app-loading>

  <ng-container *ngIf="!loading">

    <!-- TABS -->
    <nav ngbNav #nav="ngbNav" class="nav-pills nav-fill flex-nowrap" [activeId]="activeTabId"
         (navChange)="onTabChanged($event)">

      <!-- PROFILE -->
      <ng-container ngbNavItem="Profile">

        <a ngbNavLink>
          <span class="d-none d-md-inline me-2">{{ 'PROFILE.TAB.PROFILE' | translate }}</span>
          <i class="fas fa-user"></i>
        </a>
        <ng-template ngbNavContent>
          <app-candidate-profile
            [candidate]="candidate">
          </app-candidate-profile>
        </ng-template>
      </ng-container>

      <!-- TASKS -->
      <ng-container ngbNavItem="Tasks">
        <a ngbNavLink>
          <span class="d-none d-md-inline me-2">{{ 'PROFILE.TAB.TASKS' | translate }}</span>
          <i class="fas fa-list-check"></i>
        </a>
        <ng-template ngbNavContent>
          <app-candidate-tasks
            [candidate]="candidate"
            (refresh)="fetchCandidate()">
          </app-candidate-tasks>
        </ng-template>
      </ng-container>

      <!-- JOBS (Candidate Opportunities) -->
      <ng-container *ngIf="canSeeJobTab" ngbNavItem="Opps">
        <a ngbNavLink>
          <span class="d-none d-md-inline me-2">{{ 'PROFILE.TAB.OPPS' | translate }}</span>
          <i class="fas fa-briefcase me-1"></i>
          <app-chat-read-status *ngIf="canViewChats"
            [chats]="chatsForAllJobs"
          ></app-chat-read-status>
        </a>
        <ng-template ngbNavContent>
          <app-candidate-opps
            [candidate]="candidate"
            [filteredOpps]="filteredOpps">
          </app-candidate-opps>
        </ng-template>
      </ng-container>

      <!-- CHAT with source partner -->
      <ng-container *ngIf="canSeeChatTab" ngbNavItem="Chat">
        <a ngbNavLink>
          <span class="d-none d-md-inline me-2">{{ 'CHAT.HEADER' | translate }}</span>
          <i class="fas fa-message me-1"></i>
          <app-chat-read-status
            [chats]="[sourceChat]"
          ></app-chat-read-status>
        </a>
        <ng-template ngbNavContent>
          <div class="chat-title">
            <app-tab-header>
              <h3>
                {{ 'CANDIDATE-OPPS.TABLE.SOURCE-CHAT' | translate }}
              </h3>
            </app-tab-header>
          </div>
          <app-view-chat-posts
            [chat]="sourceChat"
            [readOnly]="isCandidateMuted()"
          ></app-view-chat-posts>
        </ng-template>
      </ng-container>

      <!-- SERVICES -->
      <ng-container ngbNavItem="Services" *ngIf="showServicesTab$ | async">
        <a ngbNavLink>
          <span class="d-none d-md-inline me-2">{{ 'PROFILE.TAB.SERVICES' | translate }}</span>
          <i class="fas fa-handshake"></i>
        </a>
        <ng-template ngbNavContent>
          <app-services
            [candidate]="candidate"
            [activeDuolingoTask]="activeDuolingoTask"
            (refresh)="fetchCandidate()"
            [showLinkedin$]="linkedinEligible$"
            [showReference$]="referenceEligible$"
            [showUnhcr$]="unhcrEligible$"
          ></app-services>
        </ng-template>
      </ng-container>
    </nav>
    <div [ngbNavOutlet]="nav" class="mt-2"></div>
  </ng-container>
</div>
