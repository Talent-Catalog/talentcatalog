<div class="d-sm-flex flex-column align-items-end mt-4">
  <div>
    <ng-container *ngIf="selectedTask?.completedDate">
      <h5 class="text-success">{{ 'TASKS.TASK.COMPLETEDDATE' | translate }} {{selectedTask?.completedDate | date}}</h5>
    </ng-container>
  </div>

  <tc-button size="sm" (onClick)="returnToTasksClicked()">
    <i class="me-1 fas fa-arrow-left"></i>{{ 'TASKS.TASK.RETURN' | translate }}
  </tc-button>
</div>
