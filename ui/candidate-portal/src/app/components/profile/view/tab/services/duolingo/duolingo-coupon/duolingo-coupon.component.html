<app-error [error]="error"></app-error>
<tc-loading [loading]="loading"></tc-loading>
<ng-container>
  <div
    class="coupon">{{ 'SERVICES.DUOLINGO.EXAM.DEAR' | translate }} {{ this.candidate.user.firstName }} {{ this.candidate.user.lastName }}
    ,
    <div [innerHTML]="'SERVICES.DUOLINGO.EXAM.INTRO' | translate">
    </div>

    <tc-accordion [showOpenCloseAll]="false" class="duolingo-accordion">
      <tc-accordion-item [header]="'SERVICES.DUOLINGO.EXAM.ABOUT' | translate">
        <a href="https://www.youtube.com/watch?v=Zm29HOKVcYY"
           target="_blank"
           rel="noopener noreferrer">
          {{ 'SERVICES.DUOLINGO.EXAM.ABOUT' | translate }}
        </a>
        <div [innerHTML]="'SERVICES.DUOLINGO.EXAM.ABOUT_TEXT' | translate"></div>
      </tc-accordion-item>

      <tc-accordion-item [header]="'SERVICES.DUOLINGO.EXAM.TECHNICAL_STEPS' | translate">
        <div [innerHTML]="'SERVICES.DUOLINGO.EXAM.TECHNICAL_STEPS_TEXT' | translate"></div>
      </tc-accordion-item>

      <tc-accordion-item [header]="'SERVICES.DUOLINGO.EXAM.STEPS' | translate">
        <div [innerHTML]="'SERVICES.DUOLINGO.EXAM.STEPS_TEXT' | translate"></div>
      </tc-accordion-item>
    </tc-accordion>


    <h4>{{ 'SERVICES.DUOLINGO.EXAM.GOOD_LUCK' | translate }}
    </h4>

    <div class="text-center">
      <b><tc-button class="test-button"
                    href="https://englishtest.duolingo.com/pay/{{selectedCoupon}}}?login_view=register&cta=Accept%20Coupon&show_bundle=false"
                    target="_blank"
                    (onClick)="updateSimpleTask()">
        {{ 'SERVICES.DUOLINGO.EXAM.CTA_BUTTON' | translate }}
      </tc-button></b>
    </div>
  </div>
</ng-container>
