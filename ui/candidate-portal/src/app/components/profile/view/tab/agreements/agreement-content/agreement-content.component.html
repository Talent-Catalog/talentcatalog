<div>
  <div class="d-sm-flex justify-content-between align-items-center mb-3"
       *ngIf="showBack">
    <tc-button (onClick)="back.emit()">
      <tc-icon color="white"><i class="me-1 fas fa-arrow-left"></i></tc-icon>
      {{ 'AGREEMENTS.BACK' | translate }}
    </tc-button>
  </div>

  <app-show-terms [requestTermsRead]="false">
    <div [innerHtml]="content"></div>
  </app-show-terms>

  <div class="alert alert-success mt-3 text-center"
       [innerHTML]="'PROFILE.PRIVACY.THANK_ACCEPTANCE' | translate:{partner: counterpartyName}">
  </div>

  <div class="card mt-4 border-success shadow-sm mb-2">
    <div class="card-body">
      <h6 class="mb-0 text-success">{{ 'PROFILE.PRIVACY.ACCEPTANCE_DETAILS' | translate }}</h6>
      <ul class="list-unstyled mb-0 text-muted small mt-2">
        <li>
          <strong>{{ 'PROFILE.PRIVACY.VERSION' | translate }}:</strong> {{ acceptedId }}
        </li>
        <li>
          <strong>{{ 'PROFILE.PRIVACY.ACCEPTED_ON' | translate }}:</strong>
          {{ acceptedDate | date:'mediumDate' }}
        </li>
      </ul>
    </div>
  </div>
</div>
