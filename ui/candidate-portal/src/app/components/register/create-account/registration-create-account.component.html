<div class="container">

  <app-error [error]="error"></app-error>

  <tc-loading [loading]="loading"></tc-loading>

  @if (!authenticated && !loading) {
    <tc-label class="form-check-label">
      <input type="checkbox" [value]="consented" (change)="onToggleConsent()">
      {{ 'REGISTRATION.CONTACT.LABEL.CONTACTCONSENTREGISTRATION' | translate }}
    </tc-label>

    <div class="text-center mt-2">
      <tc-button [disabled]="!consented" class="w-75"
                 (onClick)="onRegister()"
      >{{ 'LANDING.REGISTER' | translate }}
      </tc-button>
    </div>

    <div class="text-center mt-2">
      <a class="small" [routerLink]="'/login'">
        {{ 'LOGIN.BUTTON.ALREADY' | translate }}
      </a>
    </div>
  }
</div>
