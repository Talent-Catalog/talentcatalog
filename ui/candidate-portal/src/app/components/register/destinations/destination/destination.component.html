<div *ngIf="error">
  {{error}}
</div>
<form [formGroup]="form">

  <div class="mb-3">
    <tc-label [for]="'interest'+country.id">
      {{ 'REGISTRATION.DESTINATIONS.LABEL.INTEREST' | translate: {countryName: country.name} }}<sup>*</sup>
    </tc-label>
    <ng-select [id]="'interest'+country.id" [formControlName]="'interest'"
               [items]="destInterestOptions" [clearOnBackspace]="false"
               class="tc-select"
               placeholder="Select" bindLabel="stringValue" bindValue="key"></ng-select>
  </div>

  <div  *ngIf="interest != null">
    <div class="mb-3">
      <tc-label [for]="'notes'+country.id">{{ 'REGISTRATION.DESTINATIONS.LABEL.NOTES' | translate }}</tc-label>
      <tc-textarea [id]="'notes'+country.id"
                   [formControlName]="'notes'"
                   rows="3"></tc-textarea>
    </div>
  </div>
</form>
