<div class="modal-header">
  <h4 class="modal-title">{{ 'REGISTRATION.OCCUPATION.DELETE.TITLE' | translate }}</h4>
  <tc-button type="plain" color="gray" class="btn-close" data-bs-dismiss="modal" aria-label="Close" (onClick)="cancel()"></tc-button>
</div>
<div class="modal-body">
  <p>{{ 'REGISTRATION.OCCUPATION.DELETE.CONFIRMATION' | translate }}</p>
</div>
<div class="modal-footer">
  <span *ngIf="deleting"><i class="fas fa-spinner fa-spin"></i> deleting...</span>
  <tc-button color="error" size="lg" class="btn"
             [disabled]="deleting"
             (onClick)="confirm()">{{ 'REGISTRATION.OCCUPATION.DELETE.YES' | translate }}</tc-button>
  <tc-button color="gray" size="lg"
             [disabled]="deleting"
             (onClick)="cancel()">{{ 'REGISTRATION.OCCUPATION.DELETE.NO' | translate }}</tc-button>
</div>
