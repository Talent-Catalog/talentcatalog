<div *ngIf="reason" class="alert alert-danger">
  <h1>
    You are being logged out.
  </h1>
  <h2>Reason</h2>
  {{ reason }}
  <div>
    You will be automatically logged out in {{ secondsRemaining }} seconds.
  </div>
  <div>
    <button type="button" class="btn btn-sm btn-outline-danger ms-3" (click)="logout()">
      Logout now
    </button>
  </div>
</div>
