<form class="card" [formGroup]="form">

  <div class="mb-3">
    <tc-label for="name">{{ 'REGISTRATION.CERTIFICATIONS.LABEL.NAME' | translate }} <sup>*</sup></tc-label>
    <tc-input type="text" id="name" placeholder="" [formControlName]="'name'"></tc-input>
    <app-form-control-error [control]="form.controls.name"></app-form-control-error>
  </div>

  <div class="mb-3">
    <tc-label for="institution">{{ 'REGISTRATION.CERTIFICATIONS.LABEL.INSTITUTION' | translate }} <sup>*</sup></tc-label>
    <tc-input type="text" id="institution" placeholder="" [formControlName]="'institution'"></tc-input>
    <app-form-control-error [control]="form.controls.institution"></app-form-control-error>
  </div>

  <div class="mb-3">
    <tc-label for="dateCompleted">{{ 'REGISTRATION.CERTIFICATIONS.LABEL.DATECOMPLETED' | translate }} <sup>*</sup></tc-label>
    <tc-date-picker id="dateCompleted" [control]="form.controls.dateCompleted"></tc-date-picker>
    <app-form-control-error [control]="form.controls.dateCompleted"></app-form-control-error>
    <p class="small mt-2 mb-0">
      {{ 'FORM.LABEL.APPROX' | translate }}
    </p>
  </div>

  <div class="text-center mt-4 submit">
    <tc-button [disabled]="form.invalid"
            (onClick)="save()">
      {{ 'FORM.LABEL.SAVE' | translate }}
    </tc-button>
  </div>

</form>
