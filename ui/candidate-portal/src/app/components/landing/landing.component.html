<app-auth-error
  [error]="authStatus?.error"
  (dismissed)="dismissAuthError()">
</app-auth-error>
<app-error [error]="error"></app-error>

<div *ngIf="authStatus?.busy" class="alert alert-info">
  Connecting to authentication service...
</div>
<div class="container">

  <div class="row justify-content-center mt-4">

    <div class="col-sm-12 col-lg-6">

      @if (!authAction) {
        <tc-card [header]="false">
          <div class="text-center my-3 w-75 mx-auto">
            <tc-button
              color="primary"
              type="outline"
              (onClick)="onLogin()"
              [queryParamsHandling]="'merge'">
              {{ 'LANDING.LOGIN' | translate }}
            </tc-button>
          </div>
        </tc-card>
        <tc-card [header]="false">
          <div class="text-center my-3 w-75 mx-auto">
            <tc-button
              color="primary"
              type="outline"
              (onClick)="onRegister()"
              [queryParamsHandling]="'merge'">
              {{ 'LANDING.REGISTER' | translate }}
            </tc-button>
          </div>
        </tc-card>
      }
    </div>
  </div>
</div>
