<form [formGroup]="loginForm" (submit)="login()">
<!--  <h1>{{ 'LOGIN.TITLE' | translate }}</h1>-->

  <app-error [error]="error"></app-error>

  <tc-field>
    <tc-label for="username">{{ 'LOGIN.LABEL.USERNAME' | translate }}</tc-label>
    <tc-input id="username"
              type="text"
              [formControlName]="'username'"
              [invalid]="loginForm.controls['username'].touched && loginForm.controls['username'].invalid">
    </tc-input>
  </tc-field>

  <tc-field>
    <tc-label for="password">{{ 'LOGIN.LABEL.PASSWORD' | translate }}</tc-label>
    <tc-input id="password"
              type="password"
              [formControlName]="'password'"
              [invalid]="loginForm.controls['password'].touched && loginForm.controls['password'].invalid">
    </tc-input>
  </tc-field>

  <div class="text-center">
    <tc-button [disabled]="loading || !loginForm.valid">
      {{ 'LOGIN.BUTTON.LOGIN' | translate }}
    </tc-button>
  </div>
</form>

<div class="text-center mt-2 small">
  <a [routerLink]="'/reset-password'">{{ 'LOGIN.BUTTON.FORGOT' | translate }}</a>
</div>
