<div class="container p-5">

  <h1>{{ 'CHANGEPASSWORD.TITLE' | translate }}</h1>

  <!-- ERROR -->
  <app-error [error]="error"></app-error>

  <!-- LOADING -->
  <tc-loading [loading]="loading"></tc-loading>

  <!-- CONFIRMATION -->
  <tc-alert type="success" *ngIf="updated">
    {{ 'CHANGEPASSWORD.SUCCESS' | translate }}
  </tc-alert>

  <form [formGroup]="form" *ngIf="!loading && !tokenInvalid && form">

    <!-- Old Password -->
    <tc-field *ngIf="!reset">
      <tc-label for="oldPassword">{{ 'CHANGEPASSWORD.LABEL.OLDPASSWORD' | translate }}</tc-label>
      <tc-input id="oldPassword" type="password" [formControlName]="'oldPassword'"></tc-input>
    </tc-field>

    <!-- Password -->
    <tc-field>
      <tc-label for="password">{{ 'CHANGEPASSWORD.LABEL.PASSWORD' | translate }}</tc-label>
      <tc-input id="password" type="password" [formControlName]="'password'"></tc-input>
    </tc-field>

    <!-- Confirmation Password -->
    <tc-field>
      <tc-label for="passwordConfirmation">{{ 'CHANGEPASSWORD.LABEL.PASSWORDCONFIRMATION' | translate }}</tc-label>
      <tc-input id="passwordConfirmation" type="password" [formControlName]="'passwordConfirmation'"></tc-input>
    </tc-field>

    <div class="text-end">

      <tc-button class="mb-4"
              [disabled]="loading || form.invalid || form.pristine"
              (onClick)="updatePassword()">
        {{ 'CHANGEPASSWORD.BUTTON.UPDATE' | translate }}
      </tc-button>

    </div>

  </form>

</div>
