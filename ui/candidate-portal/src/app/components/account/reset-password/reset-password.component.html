<div class="container">

  <h1>{{ 'RESETPASSWORD.TITLE' | translate }}</h1>

  <!-- CONFIRMATION -->
  <tc-alert type="success" *ngIf="updated">
    {{ 'RESETPASSWORD.SUCCESS' | translate }}
  </tc-alert>

   <form [formGroup]="form" *ngIf="!updated">

    <!-- Password -->
     <tc-field>
       <tc-label for="email">{{ 'RESETPASSWORD.LABEL.EMAIL' | translate }}</tc-label>
       <tc-input id="email" type="text" [formControlName]="'email'">
       </tc-input>
     </tc-field>

    <div class="text-end">
      <!-- SUBMIT -->
      <tc-button class="mb-4"
              [disabled]="loading || form.invalid || form.pristine"
              (onClick)="sendResetEmail()">
        {{ 'RESETPASSWORD.BUTTON.RESET' | translate }}
      </tc-button>
    </div>

  </form>

</div>
